name: plastic_business_app
description: Plastic Bucket Business — Firebase + Gold Premium Edition
publish_to: "none"
version: 5.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.9
  cloud_firestore: ^4.15.9
  # State & Storage
  get: ^4.6.6
  get_storage: ^2.1.1
  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  share_plus: ^10.0.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  image_picker: ^1.0.7
  cupertino_icons: ^1.0.6
  url_launcher: ^6.3.0
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
